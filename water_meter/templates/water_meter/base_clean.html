<!DOCTYPE html>
<html lang="en" data-theme="github-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Lora-Water{% endblock %}</title>
  <style>
    :root {
      --bg: #ffffff; --bg-alt: #f6f8fa; --surface: #ffffff; --surface-alt: #f3f4f6;
      --text: #1f2328; --text-secondary: #656d76; --text-muted: #8b949e;
      --border: #d0d7de; --border-light: #d8dee4;
      --primary: #0969da; --primary-hover: #0550ae; --accent: #cf222e;
      --nav-bg: #ffffff; --nav-shadow: 0 2px 8px rgba(0,0,0,0.08);
      --card-bg: #ffffff; --card-border: #d8dee4;
      --hero-bg: linear-gradient(135deg, #ffffff, #f6f8fa); --hero-text: #1f2328;
      --input-bg: #ffffff; --input-border: #d0d7de;
      --valid: #1a7f37; --invalid: #cf222e;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
    }
    main { flex: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%; }
    .oc-form { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
    .oc-form-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .oc-form-group label { font-weight: 600; font-size: 0.875rem; }
    .oc-req { color: var(--invalid); }
    .oc-form-group input, .oc-form-group textarea, .oc-form-group select {
      padding: 0.625rem; border: 2px solid var(--input-border); border-radius: 8px;
      font: inherit; background: var(--input-bg); color: var(--text); transition: border-color 0.2s; width:100%;
    }
    .oc-form-group input:focus, .oc-form-group textarea:focus { outline: none; border-color: var(--primary); }
    .oc-form-btn {
      padding: 0.75rem; background: var(--primary); color: #fff; border: none;
      border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer;
    }
    .oc-form-btn:hover { background: var(--primary-hover); }
    .oc-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.375rem 0.875rem; border-radius: 6px; font-size: 0.85rem;
      font-weight: 500; text-decoration: none; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.15s;
    }
    .oc-btn:hover { background: var(--bg-alt); }
    .oc-btn-sm { padding: 0.25rem 0.625rem; font-size: 0.8rem; }
    .oc-login-card {
      max-width: 400px; margin: 4rem auto; padding: 2rem;
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
    }
    .oc-login-card h2 { margin: 0 0 1.5rem; text-align: center; }
    .oc-messages { margin-bottom: 1.5rem; }
    .oc-message {
      padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem;
      border: 1px solid var(--border-light); margin-bottom: 0.5rem;
    }
    .oc-message-success { background: #dafbe1; color: #1a7f37; border-color: #1a7f37; }
    .oc-message-error { background: #ffebe9; color: #cf222e; border-color: #cf222e; }
  </style>
</head>
<body>
  <main>
    {% if messages %}
    <div class="oc-messages">
      {% for msg in messages %}
      <div class="oc-message oc-message-{{ msg.tags }}">{{ msg }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
